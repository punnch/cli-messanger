version: "2"

run:
  timeout: 5m
  tests: false

linters:
  enable:
    # --- correctness ---
    - errcheck        # unhandled errors
    - govet           # same as go vet
    - staticcheck     # deep static analysis
    - unused          # unused code
    - ineffassign     # assigned but never used

    # --- bugs ---
    - bodyclose       # HTTP response body not closed
    - nilerr          # wrong nil error returns
    - sqlclosecheck   # sql.Rows/Stmt not closed

    # --- style ---
    - godot           # comments should end with a period

  settings:
    gocognit:
      min-complexity: 15

    goimports:
      local-prefixes: github.com/punnch/cli-messanger  # your module path

issues:
  max-issues-per-linter: 50
  max-same-issues: 3
