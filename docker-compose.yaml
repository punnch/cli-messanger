services:
  messanger:
    build:
      context: ${PROJECT_ROOT}
      dockerfile: cmd/server/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - TCP_ADDR=:9000
      - LOGGER_FOLDER=/app/out/logs
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_HOST=postgres
      - POSTGRES_TIMEOUT=${POSTGRES_TIMEOUT}
    volumes:
      - ${PROJECT_ROOT}/out/logs:/app/out/logs
    ports:
      - "9000:9000"
    restart: always

  postgres:
    image: postgres:18-bookworm
    container_name: postgres
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ~/.docker-volumes/messanger-pgdata:/var/lib/postgresql
    restart: always

  port-forwarder:
    image: alpine/socat:1.8.0.3
    container_name: postgres-port-forwarder
    command: "tcp-listen:5432,fork,reuseaddr tcp-connect:postgres:5432"
    ports:
      - "127.0.0.1:5432:5432"

  postgres-migrate:
    image: migrate/migrate:v4.19.1
    container_name: postgres-migrate
    volumes:
      - ${PROJECT_ROOT}/migrations:/migrations
